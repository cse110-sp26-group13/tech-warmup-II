<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackbeard's Bounty</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Blackbeard's Bounty</h1>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch color theme">
          Switch to Light Mode
        </button>
      </header>

      <section class="machine" aria-label="Slot machine">
        <div class="machine-layout">
          <div class="reels" id="reels" aria-live="polite"></div>

          <section class="controls" aria-label="Game controls">
            <button id="spinButton" class="spin-button" type="button" aria-label="Spin">
              <span id="spinControlLabel" class="spin-button-label">Spin</span>
            </button>
          </section>
        </div>
      </section>

      <section class="status" aria-label="Game status">
        <p>Balance: <strong id="balance">$0</strong></p>
        <p>Fixed Bet: <strong id="bet">$0</strong></p>
        <p>Board Size: <strong id="boardSize">6 x 5</strong></p>
        <p id="result" class="result">Press Spin to play.</p>
      </section>

    </main>

    <script src="js/config.js" defer></script>
    <script src="js/slotMachine.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
